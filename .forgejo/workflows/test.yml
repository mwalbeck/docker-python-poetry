name: Test

on: pull_request

jobs:
  lint:
    if: github.ref != 'refs/heads/renovate/*'
    runs-on: docker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: https://github.com/hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          recursive: true

  python3_10:
    runs-on: dind
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get docker tags
        id: tags
        shell: sh
        env:
          VERSION_TYPE: "docker_env"
          APP_NAME: "POETRY"
          APP_ENV: "3.10"
          DOCKERFILE_PATH: "3.10/Dockerfile"
          IMAGE_NAME: "git.walbeck.it/mwalbeck/python-poetry"
        run: |
          determine-docker-tags
          dockerd &
      - name: Set up Docker Buildx
        uses: https://github.com/docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Test build
        uses: https://github.com/docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          tags: ${{ steps.tags.outputs.tags }}
          file: "3.10/Dockerfile"

  python3_11:
